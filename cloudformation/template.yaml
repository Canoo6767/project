AWSTemplateFormatVersion: "2010-09-09"
Description: "Template para desplegar EC2 y S3 para la WebApp"

Resources:
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0c55b159cbfafe1f0 # Amazon Linux 2 (ejemplo, cambia según región)
      KeyName: my-keypair
      SecurityGroups:
        - !Ref MySecurityGroup

  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Permitir acceso a la aplicación"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5173
          ToPort: 5173
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 27017
          ToPort: 27017
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
    # Comentario: Los puertos abiertos permiten acceso al frontend (5173), backend (8080) y MongoDB (27017).

  MyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: my-webapp-bucket
