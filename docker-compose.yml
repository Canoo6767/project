services:
  mongo:
    image: mongo:6.0
    container_name: project-mongo-1
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: project-backend-1
    ports:
      - "8080:8080"
    depends_on:
      - mongo
    environment:
      - MONGO_URL=mongodb://mongo:27017/clima
      - OPENWEATHER_KEY=${OPENWEATHER_KEY}
    volumes:
      - ./backend/logs:/app/logs   # 👈 cambio clave: ruta correcta
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: project-frontend-1
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
